services:
  postgres:
    image: postgres:16-alpine
    container_name: fainder_postgres
    environment:
      POSTGRES_DB: fainder_db
      POSTGRES_USER: fainder
      POSTGRES_PASSWORD: fainder_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fainder -d fainder_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fainder_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fainder_backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://fainder:fainder_pass@postgres:5432/fainder_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
    container_name: fainder_celery
    command: uv run celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://fainder:fainder_pass@postgres:5432/fainder_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: fainder_frontend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: